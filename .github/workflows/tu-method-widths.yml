name: Build TU method widths

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Path to TU method config
        required: true
        default: config/tu-method-widths.json
        type: string
      upload_pmtiles:
        description: Upload PMTiles to Easyname FTP
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin tippecanoe lftp

      - name: Install Python dependencies
        run: pip install -r requirements-tu-method.txt

      - name: Build TU method widths
        run: python tu_method_widths/run_tu_method_widths.py --config "${{ inputs.config_path }}"

      - name: Transform output to WGS84
        run: |
          mkdir -p work/tu-method-widths dist/tu-method-widths
          if [ -s work/tu-method-widths/tu_surfaces_metric.geojsonseq ]; then
            ogr2ogr -f GeoJSONSeq \
              -s_srs EPSG:31256 \
              -t_srs EPSG:4326 \
              work/tu-method-widths/tu_surfaces_4326.geojsonseq \
              work/tu-method-widths/tu_surfaces_metric.geojsonseq
          else
            echo "No TU surfaces generated; skipping transform."
          fi

      - name: Build PMTiles
        run: |
          if [ -s work/tu-method-widths/tu_surfaces_4326.geojsonseq ]; then
            tippecanoe \
              -o dist/tu-method-widths/tu_method_widths.pmtiles \
              --force \
              --layer tu_method_widths \
              --minimum-zoom 12 \
              --maximum-zoom 17 \
              --base-zoom 14 \
              --drop-densest-as-needed \
              work/tu-method-widths/tu_surfaces_4326.geojsonseq
          else
            echo "No WGS84 TU surfaces generated; skipping PMTiles."
          fi

      - name: Upload PMTiles to Easyname
        if: ${{ inputs.upload_pmtiles }}
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          test -f dist/tu-method-widths/tu_method_widths.pmtiles
          chmod +x .github/scripts/lftp-upload.sh
          .github/scripts/lftp-upload.sh dist/tu-method-widths/tu_method_widths.pmtiles Gehsteigbreiten/tu_method_widths.pmtiles
          .github/scripts/lftp-upload.sh dist/tu-method-widths/tu_method_widths_summary.json Gehsteigbreiten/tu_method_widths_summary.json

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tu-method-widths
          path: |
            dist/tu-method-widths/
            work/tu-method-widths/*.geojsonseq
          if-no-files-found: error
