name: Build centerline widths

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Path to centerline config
        required: true
        default: config/centerline-widths.json
        type: string
      upload_pmtiles:
        description: Upload PMTiles to Easyname FTP
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin tippecanoe lftp

      - name: Install Python dependencies
        run: pip install -r requirements-centerline.txt

      - name: Build centerline widths
        run: python centerline_widths/run_centerline_widths.py --config "${{ inputs.config_path }}"

      - name: Transform output to WGS84
        run: |
          mkdir -p work/centerline-widths dist/centerline-widths
          if [ -s work/centerline-widths/centerline_widths_metric.geojsonseq ]; then
            ogr2ogr -f GeoJSONSeq \
              -s_srs EPSG:31256 \
              -t_srs EPSG:4326 \
              work/centerline-widths/centerline_widths_4326.geojsonseq \
              work/centerline-widths/centerline_widths_metric.geojsonseq
          else
            echo "No centerline measurements generated; skipping transform."
          fi

      - name: Build PMTiles
        run: |
          if [ -s work/centerline-widths/centerline_widths_4326.geojsonseq ]; then
            tippecanoe \
              -o dist/centerline-widths/centerline_widths.pmtiles \
              --force \
              --layer centerline_widths \
              --minimum-zoom 12 \
              --maximum-zoom 17 \
              --base-zoom 14 \
              --drop-densest-as-needed \
              work/centerline-widths/centerline_widths_4326.geojsonseq
          else
            echo "No WGS84 measurements generated; skipping PMTiles."
          fi

      - name: Upload PMTiles to Easyname
        if: ${{ inputs.upload_pmtiles }}
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          test -f dist/centerline-widths/centerline_widths.pmtiles
          chmod +x .github/scripts/lftp-upload.sh
          .github/scripts/lftp-upload.sh dist/centerline-widths/centerline_widths.pmtiles Gehsteigbreiten/centerline_widths.pmtiles
          .github/scripts/lftp-upload.sh dist/centerline-widths/centerline_widths_summary.json Gehsteigbreiten/centerline_widths_summary.json

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: centerline-widths
          path: |
            dist/centerline-widths/
            work/centerline-widths/*.geojsonseq
          if-no-files-found: error
