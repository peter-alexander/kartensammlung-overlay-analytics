name: Build sidewalk widths

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Path to JS config
        required: true
        default: config/sidewalk-widths.config.js
        type: string
      skip_pmtiles:
        description: Build only GeoJSONSeq, skip PMTiles
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin tippecanoe

      - name: Install npm dependencies
        run: npm install

      - name: Build sidewalk widths
        run: |
          if [ "${{ inputs.skip_pmtiles }}" = "true" ]; then
            npm run build:sidewalk-widths -- --config "${{ inputs.config_path }}" --skip-pmtiles
          else
            npm run build:sidewalk-widths -- --config "${{ inputs.config_path }}"
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: sidewalk-widths
          path: |
            dist/
            work/sidewalk-widths/*.geojsonseq
          if-no-files-found: error
