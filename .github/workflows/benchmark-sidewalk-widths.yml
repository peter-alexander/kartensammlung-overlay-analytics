name: Build sidewalk widths

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Path to JS config
        required: true
        default: config/sidewalk-widths.config.js
        type: string
      skip_pmtiles:
        description: Build only GeoJSONSeq, skip PMTiles
        required: true
        default: false
        type: boolean
      upload_pmtiles:
        description: Upload PMTiles to Easyname FTP
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin tippecanoe lftp

      - name: Install npm dependencies
        run: npm install

      - name: Build sidewalk widths
        run: |
          if [ "${{ inputs.skip_pmtiles }}" = "true" ]; then
            npm run build:sidewalk-widths -- --config "${{ inputs.config_path }}" --skip-pmtiles
          else
            npm run build:sidewalk-widths -- --config "${{ inputs.config_path }}"
          fi

      - name: Upload PMTiles to Easyname
        if: ${{ inputs.upload_pmtiles && !inputs.skip_pmtiles }}
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/lftp-upload.sh
          .github/scripts/lftp-upload.sh dist/sidewalk_widths.pmtiles Gehsteigbreiten/sidewalk_widths.pmtiles
          .github/scripts/lftp-upload.sh dist/sidewalk_widths_summary.json Gehsteigbreiten/sidewalk_widths_summary.json

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: sidewalk-widths
          path: |
            dist/
            work/sidewalk-widths/*.geojsonseq
          if-no-files-found: error
